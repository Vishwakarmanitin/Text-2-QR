<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>QR Generator</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://jsdelivr.net" rel="stylesheet">
    <!-- FontAwesome for modern visual icons -->
    <link rel="stylesheet" href="https://cloudflare.com">
    
    <style>
      body {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        align-items: center; 
        justify-content: center; 
      }
      .card-custom {
        border: 5px solid rgba(255, 255, 255, 0.2);
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(10px);
        transition: transform 0.3s ease, box-shadow 0.3s ease;
        padding: 3.5rem !important; 
      }
      .card-custom:hover {
        transform: translateY(-5px);
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.25) !important;
      }
      .form-wrapper {
        max-width: 500px;
        width: 100%;
        margin-left: auto;
        margin-right: auto;
      }
      
      .form-control {
        border-radius: 12px !important;
        padding: 14px 20px;
        font-size: 1.05rem;
        border: 1px solid #ced4da;
      }
      .form-control:focus {
        border-color: #764ba2;
        box-shadow: 0 0 0 0.25rem rgba(118, 75, 162, 0.25);
      }
      
      .input-icon-box {
        border-radius: 12px !important;
        background-color: #f8f9fa;
        color: #764ba2;
        padding-left: 20px;
        padding-right: 20px;
        border: 1px solid #ced4da;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      
      .btn-gradient {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        border-radius: 12px;
        padding: 14px;
        font-weight: 600;
        font-size: 1.1rem;
        letter-spacing: 0.5px;
        transition: opacity 0.2s;
      }
      .btn-gradient:hover {
        color: white;
        opacity: 0.9;
      }
      @keyframes popIn {
        0% { opacity: 0; transform: scale(0.9); }
        100% { opacity: 1; transform: scale(1); }
      }
      .qr-result-box {
        animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
      }
    </style>
  </head>
  <body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card card-custom shadow-lg">
                
                <div class="text-center mb-5">
                    <h2 class="fw-bold text-dark m-0">
                        <i class="fa-solid fa-qrcode text-primary me-2"></i>Text to QR Generator
                    </h2>
                </div>
                
                <!-- Keeps your exact standard POST method intact for Flask -->
                <form method="POST" class="form-wrapper">
                    <div class="mb-4">
                        <label for="exampleInputEmail1" class="form-label fw-semibold text-secondary text-center d-block mb-2">Enter Text or URL Link</label>
                        
                        <!-- FIXED: Switched from 'input-group' to 'd-flex gap-2' to completely remove the background artifact box -->
                        <div class="d-flex gap-2">
                            <div class="input-icon-box"><i class="fa-solid fa-link"></i></div>
                            <input type="text" class="form-control" name="text" id="exampleInputEmail1" placeholder="Type or paste context here..." required>
                        </div>
                    </div>
                    
                    <button type="submit" class="btn btn-gradient w-100 shadow-sm">
                        Generate QR Code <i class="fa-solid fa-arrow-right ms-2"></i>
                    </button>
                </form>

                <!-- Flask integration placeholder layout -->
                {% if qr_code %}
                <div class="text-center mt-5 qr-result-box">
                    <div class="p-4 bg-light rounded-4 d-inline-block border shadow-inner mb-3">
                        <img src="{{ qr_code }}" alt="Generated QR Code" class="img-fluid" style="max-width: 220px;">
                    </div>
                    <div>
                        <p class="text-muted small mb-0"><i class="fa-solid fa-circle-check text-success me-1"></i> Ready to scan</p>
                    </div>
                </div>
                {% endif %}

            </div>
        </div>
    </div>
</div>

  </body>
</html>
